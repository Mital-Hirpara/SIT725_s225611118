<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Book Library</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <div>
          <h1>My Book Library</h1>
        </div>
        <p class="topbar-note">A simple place to keep track of books you want to save.</p>
      </div>
    </header>

    <main class="page-shell">
      <section class="hero-panel">
        <div class="hero-copy">
          <h2>Keep your reading list in one place</h2>
          
        </div>
        <div class="hero-stat">
          <span>Total Books</span>
          <strong id="bookCount">0</strong>
        </div>
      </section>

      <section class="input-panel">
        <h3>Add a new book</h3>
        <div class="input-section">
          <input type="text" id="title" placeholder="Book Title" />
          <input type="text" id="author" placeholder="Author Name" />
          <button onclick="addBook()" id="add-btn">Add Book</button>
        </div>
      </section>

      <section class="collection-panel">
        <div class="section-heading">
          <h2>Available Books</h2>
          <p>Your collection appears here as cards.</p>
        </div>
        <div id="emptyState" class="empty-state">
          No books added yet. Start by adding your first book above.
        </div>
        <div id="bookList" class="book-list" aria-live="polite"></div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
